name: Translate README

on:
  workflow_dispatch: # Allows manual triggering

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit changes back
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Gemini README Translator
        id: translator
        uses: artryazanov/gemini-readme-translator@v1
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          languages: 'ru, th, zh-CN, zh-TW, hi, es, fr, ar, bn, pt, ur, id, de, ja, mr, te, tr, ta, vi, ko, sw, it, gu, fa, kn, pl, ml, uk, ro, nl, el, hu, sv, cs, sr, he, bg, da, fi, no, sk, hr, lt, sl, lv, et'
          output_dir: 'translations'
          model: 'gemini-3.1-pro-preview'

      - name: Print Translation Stats
        run: |
          echo "Process took ${{ steps.translator.outputs.duration_seconds }} seconds."
          echo "Input tokens used: ${{ steps.translator.outputs.input_tokens_used }}"
          echo "Output tokens used: ${{ steps.translator.outputs.output_tokens_used }}"
          echo "Total tokens used: ${{ steps.translator.outputs.total_tokens_used }}"
