name: "Gemini README Translator"
description: "Automatically translates README.md to multiple languages using Gemini API and adds a navigation menu."

branding:
  icon: book-open
  color: orange

inputs:
  api_key:
    description: "Gemini API Key"
    required: true
  github_token:
    description: "GitHub Token for committing or creating PR"
    required: true
  languages:
    description: "Comma-separated list of target languages (e.g., 'ru, zh-CN, es, de')"
    required: true
  add_language_menu:
    description: "Set to 'false' to disable automatic generation of the language navigation menu"
    required: false
    default: "true"
  menu_style:
    description: "The style of the language menu if it's generated from scratch. AI will use this as a reference."
    required: false
    default: "> 🌐 **Languages:** [English](README.md) | [Русский](README.ru.md) | [中文](README.zh-CN.md)"
  create_pr:
    description: "Set to 'true' to create a Pull Request instead of committing directly"
    required: false
    default: "false"
  commit_message:
    description: "Commit message to use when changes are pushed"
    required: false
    default: "docs: auto-translate README via Gemini"
  skip_commit:
    description: "Set to 'true' to completely skip committing or creating a PR (useful for dry runs / testing)"
    required: false
    default: "false"
  model:
    description: "Gemini model to use"
    required: false
    default: "gemini-3.1-pro-preview"
  source_file:
    description: "Source markdown file"
    required: false
    default: "README.md"
  output_dir:
    description: "Directory to save translated files (default is the same directory as the source file)"
    required: false
    default: ""

outputs:
  total_tokens_used:
    description: "Total number of tokens used for the translation operation"
    value: ${{ steps.translate.outputs.total_tokens_used }}
  input_tokens_used:
    description: "Number of input tokens processed during translation"
    value: ${{ steps.translate.outputs.input_tokens_used }}
  output_tokens_used:
    description: "Number of output tokens generated during translation"
    value: ${{ steps.translate.outputs.output_tokens_used }}
  duration_seconds:
    description: "Duration of the translation process in seconds"
    value: ${{ steps.translate.outputs.duration_seconds }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      shell: bash
      run: pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run Translation Script
      id: translate
      shell: bash
      env:
        INPUT_API_KEY: ${{ inputs.api_key }}
        INPUT_LANGUAGES: ${{ inputs.languages }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_SOURCE_FILE: ${{ inputs.source_file }}
        INPUT_OUTPUT_DIR: ${{ inputs.output_dir }}
        INPUT_ADD_LANGUAGE_MENU: ${{ inputs.add_language_menu }}
        INPUT_MENU_STYLE: ${{ inputs.menu_style }}
      run: python ${{ github.action_path }}/main.py

    - name: Commit or Create PR
      if: inputs.skip_commit != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_COMMIT_MESSAGE: ${{ inputs.commit_message }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add README*.md
        if [[ -n "${INPUT_OUTPUT_DIR}" ]]; then
          git add "${INPUT_OUTPUT_DIR}"/*.md
        fi
        
        if [[ -z $(git status -s) ]]; then
          echo "No changes detected. README files are already up to date."
          exit 0
        fi
        
        if [[ "${{ inputs.create_pr }}" == "true" ]]; then
          BRANCH_NAME="gemini-translation-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH_NAME"
          git commit -m "${INPUT_COMMIT_MESSAGE}"
          git push -u origin "$BRANCH_NAME"
          
          gh pr create \
            --title "docs: Update README translations" \
            --body "Automated translations generated by Gemini API (${{ inputs.model }})." \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH_NAME"
        else
          git commit -m "${INPUT_COMMIT_MESSAGE}"
          git push origin "HEAD:${{ github.ref_name }}"
        fi
